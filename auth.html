<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth - TODO App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="./index.html">
</head>
<body>

    <div class="auth-container">
        <div class="auth-tabs">
            <button id="loginTab" class="tab-btn active">Login</button>
            <button id="signupTab" class="tab-btn">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-form">
            <h2>Welcome Back</h2>
            <p>Login to manage your daily tasks</p>
            
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Email Address" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            
            <button type="submit" class="submit-btn">Login</button>
        </form>

        <form id="signupForm" class="auth-form notVisible">
            <h2>Create Account</h2>
            <p>Get started by creating your free account</p>
            
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="signupPassword" placeholder="Password (Min 6 chars)" minlength="6" required>
            </div>
            
            <button type="submit" class="submit-btn">Sign Up</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
